services:
  # ── ML Service (RAG + Groq LLM) ──────────────────────────────────────────
  - type: web
    name: pulse-ml
    env: python
    buildCommand: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu && pip install --no-cache-dir -r ml/requirements.txt && python -m ml.knowledge_base.ingest
    startCommand: uvicorn ml.ml_api:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.6

  # ── Backend API (Auth + Session + Proxy to ML) ───────────────────────────
  - type: web
    name: pulse-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ML_SERVICE_URL
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.6
